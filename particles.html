<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particles Swarm Export</title>
    <style>body { margin: 0; overflow: hidden; background: #000; }</style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // CONFIG
        const COUNT = 20000;
        const SPEED_MULT = 1;
        const AUTO_SPIN = true;

        // SETUP
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.01);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 0, 100);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = AUTO_SPIN;
        controls.autoRotateSpeed = 2.0;

        // POST PROCESSING
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.strength = 1.8; bloomPass.radius = 0.4; bloomPass.threshold = 0;
        composer.addPass(bloomPass);

        // SWARM OBJECTS
        const dummy = new THREE.Object3D();
        const color = new THREE.Color();
        const target = new THREE.Vector3();
        const pColor = new THREE.Color(); // Kept for safety, for potential references
        
        // INSTANCED MESH
        const geometry = new THREE.TetrahedronGeometry(0.25);
        const material = new THREE.MeshBasicMaterial({ color: 0xffffff });
        
        const instancedMesh = new THREE.InstancedMesh(geometry, material, COUNT);
        instancedMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
        scene.add(instancedMesh);

        // DATA ARRAYS
        const positions = [];
        for(let i=0; i<COUNT; i++) {
            positions.push(new THREE.Vector3((Math.random()-0.5)*100, (Math.random()-0.5)*100, (Math.random()-0.5)*100));
            instancedMesh.setColorAt(i, color.setHex(0x00ff88)); // Init Color
        }

        // CONTROL STUBS
        const PARAMS = {};
        const addControl = (id, label, min, max, val) => {
            return PARAMS[id] !== undefined ? PARAMS[id] : val;
        };
        const setInfo = () => {};
        const annotate = () => {};

        // ANIMATION LOOP
        const clock = new THREE.Clock();
        
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime() * SPEED_MULT;
            
            // Shader Time Update
            if(material.uniforms && material.uniforms.uTime) {
                material.uniforms.uTime.value = time;
            }

            controls.update();

            // SWARM LOGIC
            const count = COUNT; // Alias for user code compatibility
            for(let i=0; i<COUNT; i++) {
                 // USER CODE INJECTION START
                 const size = addControl("scale", "Attractor Scale", 5.0, 20.0, 12.0);
                 const morph = addControl("morph", "Attractor Chaos", 0.5, 2.5, 1.4);
                 const speed = addControl("speed", "Rotation Speed", 0.1, 2.0, 0.7);
                 const hueRange = addControl("hue", "Color Range", 0.1, 1.0, 0.6);

                 const t = time * speed;
                 const segment = i / count;

                 // Animate attractor coefficients dynamically using time and chaos scale
                 const a = -1.4 + Math.sin(t * 0.2) * 0.4 * morph;
                 const b = 1.6 + Math.cos(t * 0.15) * 0.3 * morph;
                 const c = 1.0 + Math.sin(t * 0.3) * 0.5 * morph;
                 const d = 0.7 + Math.cos(t * 0.25) * 0.2 * morph;

                 // Seed initial coordinates deterministically based on particle index
                 const theta = segment * Math.PI * 2.0 * 256.0;
                 const phi = Math.acos(2.0 * segment - 1.0);

                 let posX = Math.sin(phi) * Math.cos(theta);
                 let posY = Math.sin(phi) * Math.sin(theta);
                 let posZ = Math.cos(phi);

                 // Run a fast, 6-step iteration loop to resolve the Clifford chaotic attractor geometry
                 for (let step = 0; step < 6; step++) {
                   const nextX = Math.sin(a * posY) + c * Math.cos(a * posX);
                   const nextY = Math.sin(b * posX) + d * Math.cos(b * posY);
                   const nextZ = Math.sin(c * posZ) + a * Math.cos(d * posX);
                   posX = nextX;
                   posY = nextY;
                   posZ = nextZ;
                 }

                 // Apply 3D rotation to spin the attractor nebula
                 const cosRot = Math.cos(t * 0.2);
                 const sinRot = Math.sin(t * 0.2);
                 const rotX = posX * cosRot - posZ * sinRot;
                 const rotZ = posX * sinRot + posZ * cosRot;

                 target.set(rotX * size, posY * size, rotZ * size);

                 // Render a high-contrast glowing color spectrum based on the local chaotic density
                 const radius = Math.sqrt(rotX * rotX + posY * posY + rotZ * rotZ);
                 const hue = (segment * hueRange + radius * 0.1 + t * 0.05) % 1.0;
                 const saturation = 0.85 + 0.15 * Math.sin(t + radius);
                 const lightness = 0.45 + 0.25 * Math.cos(radius * 0.5 - t);
                 color.setHSL(hue, saturation, lightness);

                 // HUD info and annotations mapping
                 if (i === 0) {
                   setInfo("Chaotic Clifford Attractor", "A mathematical nebula generated by iterating Clifford equations dynamically warped by time and controlled parameters.");
                   annotate("attractor_core", new THREE.Vector3(0, 0, 0), "Attractor Core");
                 }
                 // USER CODE INJECTION END

                 // LERP & UPDATE
                 positions[i].lerp(target, 0.1);
                 dummy.position.copy(positions[i]);
                 dummy.updateMatrix();
                 instancedMesh.setMatrixAt(i, dummy.matrix);
                 instancedMesh.setColorAt(i, color); // Fix: Use 'color' which user modifies
            }
            instancedMesh.instanceMatrix.needsUpdate = true;
            instancedMesh.instanceColor.needsUpdate = true;

            composer.render();
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
